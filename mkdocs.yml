site_name: 89中音游社
site_description: 89中音游社官方网站
site_author: kbcrt

theme:
  name: material
  language: zh
  # Logo 与标签页图标（需放入 docs/assets/ 目录下）
  logo: assets/logo.png
  # favicon: assets/favicon.ico
  
  features:
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  
  palette:
    # 自动适配浅色/深色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

# 插件配置（支持搜索等核心功能）
plugins:
  - search
